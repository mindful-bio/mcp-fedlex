name: Live-Konformanz

# Periodischer Lauf der Live-Konformanz-Suiten gegen die echten Fedlex-Server.
# Zweck ist Drift-Erkennung. Die Lexika (10/11_LEXICON) locken Befunde ein,
# dieser Cron merkt, wenn der Bund Endpunkt, WAF-Heuristik oder Datenform
# ändert. Schlägt ein Lauf fehl, ist zuerst der Bund verdächtig, nicht der Code.

on:
  schedule:
    # Wöchentlich Montag 05:17 UTC. Bewusst krumme Minute, um nicht mit der
    # Cron-Spitze zur vollen Stunde auf den Fedlex-Endpunkt zu treffen.
    - cron: "17 5 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  conformance:
    name: Live-Suiten gegen Fedlex
    runs-on: ubuntu-latest
    # Schonung des Bund-Endpunkts und klare Abbruchgrenze.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # --test-threads 2 drosselt die Parallelität gegen den öffentlichen
      # SPARQL-Endpunkt (WAF-Schonung, siehe Lexikon-Befund zur SQLi-Heuristik).
      - name: JOLux-Konformanz (29 Live-Tests)
        run: cargo test -p fedlex-jolux --test lexicon_conformance -- --ignored --test-threads 2

      - name: AKN-Konformanz (12 Live-Tests)
        run: cargo test -p fedlex-akn --test lexicon_conformance -- --ignored --test-threads 2

      - name: Bridge-Konformanz (3 Live-Tests)
        run: cargo test -p fedlex-bridge --test bridge_conformance -- --ignored --test-threads 2
