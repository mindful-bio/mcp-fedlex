name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (oxigraph-store feature)
        run: |
          cargo clippy -p fedlex-store --all-targets --features oxigraph-store -- -D warnings
          cargo clippy -p mcp-ingest --all-targets --features oxigraph-store -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test (embedded Oxigraph corpus)
        run: |
          cargo test -p fedlex-store --features oxigraph-store
          cargo test -p mcp-ingest --features oxigraph-store

  integration:
    name: Docker-gated integration (Redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Integration tests (real Redis via Testcontainers)
        run: |
          cargo test -p fedlex-store --features redis-store
          cargo test -p mcp-reader
